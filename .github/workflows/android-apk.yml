name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "apk-*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Prepare APK artifact
        run: cp android/app/build/outputs/apk/debug/app-debug.apk jinsulchohae-drone-app-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jinsulchohae-drone-app-debug-apk
          path: jinsulchohae-drone-app-debug.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: jinsulchohae-drone-app-debug.apk
          name: "Jinsulchohae Drone App ${{ github.ref_name }}"
          body: |
            갤럭시 테스트용 Android debug APK입니다.
            Expo Go 없이 설치 테스트할 때 사용합니다.
